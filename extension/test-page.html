<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sliding Cat Test Page</title>
    <style>
      body {
        min-height: 180vh;
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      main {
        max-width: 680px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        color: #475569;
        line-height: 1.6;
      }

      .target {
        margin-top: 32px;
        height: 360px;
        border: 1px dashed #94a3b8;
        background: white;
        display: grid;
        place-items: center;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sliding Cat Test Page</h1>
      <p>Move your mouse downward inside the box. The cat should appear near the cursor. Move upward and it should fade.</p>
      <div class="target">Move down here</div>
    </main>
  </body>
</html>
