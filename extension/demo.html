<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sliding Cat Demo</title>
    <style>
      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #475569;
        line-height: 1.6;
      }

      .pad {
        height: 420px;
        border: 1px dashed #94a3b8;
        border-radius: 8px;
        background: #ffffff;
        display: grid;
        place-items: center;
        color: #334155;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sliding Cat Demo</h1>
      <p>Move your mouse cursor downward inside the box. Move upward to hide it.</p>
      <div class="pad">Move down here</div>
    </main>
    <script src="content.js"></script>
  </body>
</html>
